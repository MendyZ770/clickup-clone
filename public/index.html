<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Done</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; }
      body {
        background: #a855f7;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
      }
      .loader {
        text-align: center;
        padding: 20px;
        max-width: 320px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error {
        display: none;
        margin-top: 20px;
      }
      .error h2 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      .error p {
        font-size: 14px;
        opacity: 0.9;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>Chargement de Done...</p>
      <div class="error" id="error">
        <h2>Connexion impossible</h2>
        <p>
          Cette application n&eacute;cessite que le serveur Next.js soit accessible.
          Assure-toi que ton Mac est allum&eacute; et connect&eacute; au m&ecirc;me WiFi,
          puis relance l&rsquo;application.
        </p>
      </div>
    </div>
    <script>
      // Capacitor injecte capacitor.config.json avec server.url
      // Si configur&eacute;, le serveur est accessible. Sinon on affiche une erreur apr&egrave;s 5s.
      setTimeout(() => {
        document.getElementById('spinner').style.display = 'none';
        document.querySelector('.loader p').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }, 5000);
    </script>
  </body>
</html>
